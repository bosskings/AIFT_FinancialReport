<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIFT Financial Report – Test Form</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --error: #f85149;
      --success: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    fieldset {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      background: var(--surface);
    }
    legend {
      font-weight: 600;
      padding: 0 0.5rem;
      color: var(--accent);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
    }
    .field {
      margin-bottom: 1rem;
    }
    .field.full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    .actions {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 0.65rem 1.25rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #message {
      min-height: 1.5rem;
      font-size: 0.9rem;
    }
    #message.error { color: var(--error); }
    #message.success { color: var(--success); }
  </style>
</head>
<body>
  <div class="container">
    <h1>AIFT Financial Report</h1>
    <p class="subtitle">Test form – generates a PDF report via POST /api/v1/fincanceRecord/generate</p>

    <form id="reportForm">
      <fieldset>
        <legend>Required</legend>
        <div class="row">
          <div class="field">
            <label for="currentAge">Current age</label>
            <input type="number" id="currentAge" name="currentAge" min="18" max="100" value="40" required>
          </div>
          <div class="field">
            <label for="retirementAge">Retirement age</label>
            <input type="number" id="retirementAge" name="retirementAge" min="22" max="100" value="67" required>
          </div>
        </div>
        <div class="field">
          <label for="currentSalary">Current annual salary ($)</label>
          <input type="number" id="currentSalary" name="currentSalary" min="0" step="1000" value="75000" required>
        </div>
      </fieldset>

      <fieldset>
        <legend>Retirement account</legend>
        <div class="field">
          <label for="currentRetirementBalance">Current retirement balance ($)</label>
          <input type="number" id="currentRetirementBalance" name="currentRetirementBalance" min="0" step="1000" value="0">
          <span class="hint">Existing 401(k) / IRA balance</span>
        </div>
        <div class="row">
          <div class="field">
            <label for="employeeContributionRate">Employee contribution rate (%)</label>
            <input type="number" id="employeeContributionRate" name="employeeContributionRate" min="0" max="100" step="0.5" value="10">
            <span class="hint">e.g. 10 for 10%</span>
          </div>
          <div class="field">
            <label for="employerContributionRate">Employer contribution rate (%)</label>
            <input type="number" id="employerContributionRate" name="employerContributionRate" min="0" max="100" step="0.5" value="5">
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Assumptions (rates in %)</legend>
        <div class="row">
          <div class="field">
            <label for="salaryGrowthRate">Salary growth rate (%)</label>
            <input type="number" id="salaryGrowthRate" name="salaryGrowthRate" min="0" max="20" step="0.5" value="3">
          </div>
          <div class="field">
            <label for="expectedReturn">Expected investment return (%)</label>
            <input type="number" id="expectedReturn" name="expectedReturn" min="0" max="20" step="0.5" value="7">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="inflationRate">Inflation rate (%)</label>
            <input type="number" id="inflationRate" name="inflationRate" min="0" max="20" step="0.25" value="2.5">
          </div>
          <div class="field">
            <label for="withdrawalRate">Retirement withdrawal rate (%)</label>
            <input type="number" id="withdrawalRate" name="withdrawalRate" min="0" max="20" step="0.25" value="4">
            <span class="hint">e.g. 4% rule</span>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Social Security (optional)</legend>
        <div class="row">
          <div class="field">
            <label for="yearsWorked">Years worked</label>
            <input type="number" id="yearsWorked" name="yearsWorked" min="0" max="50" placeholder="Auto if empty">
          </div>
          <div class="field">
            <label for="fullRetirementAge">Full retirement age (SSA)</label>
            <input type="number" id="fullRetirementAge" name="fullRetirementAge" min="62" max="70" value="67">
          </div>
        </div>
      </fieldset>

      <div class="actions">
        <button type="submit" id="submitBtn">Generate PDF Report</button>
        <span id="message"></span>
      </div>
    </form>
  </div>

  <script>
    const API_BASE = 'https://aift-financialreport.onrender.com'; // same origin: use '' when served from server
    const ENDPOINT = (API_BASE || '') + '/api/v1/fincanceRecord/generate';

    const form = document.getElementById('reportForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = type || '';
    }

    function percentToDecimal(value) {
      if (value === '' || value === null || value === undefined) return undefined;
      const n = parseFloat(value);
      return isNaN(n) ? undefined : n / 100;
    }

    function num(value) {
      if (value === '' || value === null || value === undefined) return undefined;
      const n = parseFloat(value);
      return isNaN(n) ? undefined : n;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage('');
      submitBtn.disabled = true;

      const payload = {
        currentAge: num(form.currentAge.value),
        retirementAge: num(form.retirementAge.value),
        currentSalary: num(form.currentSalary.value),
        currentRetirementBalance: num(form.currentRetirementBalance.value),
        salaryGrowthRate: percentToDecimal(form.salaryGrowthRate.value),
        employeeContributionRate: percentToDecimal(form.employeeContributionRate.value),
        employerContributionRate: percentToDecimal(form.employerContributionRate.value),
        expectedReturn: percentToDecimal(form.expectedReturn.value),
        inflationRate: percentToDecimal(form.inflationRate.value),
        withdrawalRate: percentToDecimal(form.withdrawalRate.value),
        yearsWorked: num(form.yearsWorked.value) || undefined,
        fullRetirementAge: num(form.fullRetirementAge.value) || undefined
      };

      // Remove undefined so server uses defaults
      Object.keys(payload).forEach(k => {
        if (payload[k] === undefined) delete payload[k];
      });

      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const contentType = res.headers.get('Content-Type') || '';

        if (contentType.includes('application/pdf')) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'AIFT_Financial_Report.pdf';
          a.click();
          URL.revokeObjectURL(url);
          setMessage('Report downloaded.', 'success');
        } else {
          const data = await res.json().catch(() => ({}));
          const err = data.error || data.message || `Request failed: ${res.status}`;
          setMessage(err, 'error');
        }
      } catch (err) {
        setMessage(err.message || 'Network error. Is the server running on port 4500?', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
